<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --ink:#050d1e; --ink-2:#020814; --navy:#04132e; --blue:#2D78BD; --accent:#2D78BD;
    --white:#ffffff; --soft:rgba(255,255,255,0.72); --mute:rgba(255,255,255,0.40); --faint:rgba(255,255,255,0.22);

    /* ═══ ROBOT + ROPE CONTROLS — change these numbers to adjust ═══ */
    --robot-size: 64px;      /* robot height. bigger = larger robot */
    --robot-lift: -7px;      /* moves ROBOT up/down. positive = UP, negative = DOWN */
    --rope-height: 7px;      /* rope height above baseline. bigger = rope higher up */
    --rope-length: 36px;     /* gap between robot and text */
    --text-size: 34px;       /* scrolling text size */
    --robot-color: #cfd8e3;  /* robot body/linework (silver-white) */
    --robot-detail: #eef2f7; /* robot panel details (bright white) */
    --amber: #E8A13A;        /* rope + hook accent (warm amber) */
    /* ════════════════════════════════════════════════════════════ */
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--ink-2);
    font-family:'Inter',sans-serif; color:var(--white); cursor:none; }

  .bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(45,120,189,0.10) 0%, transparent 60%),
      linear-gradient(180deg, var(--ink) 0%, var(--navy) 55%, var(--ink-2) 100%); }

  .screen { position:relative; z-index:5; width:100vw; height:100vh;
    display:grid; grid-template-rows:auto 1fr auto; padding:50px 64px; }

  /* HEADER */
  .header { display:flex; align-items:flex-start; justify-content:space-between; }
  .logo-img { height:52px; width:auto; object-fit:contain; }
  .logo-fallback { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:24px; letter-spacing:0.10em; }
  .logo-fallback span { color:var(--blue); }
  .datetime { text-align:right; font-family:'Space Grotesk',sans-serif; }
  .datetime-time { font-size:26px; font-weight:300; letter-spacing:0.04em; color:var(--soft); }
  .datetime-date { font-size:12px; color:var(--mute); letter-spacing:0.12em; text-transform:uppercase; margin-top:5px; }

  /* CENTER */
  .center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:0; }

  /* the warm human greeting line */
  .greeting { text-align:center; margin-bottom:14px;
    animation:fadeDown 1.1s ease both; }
  .greeting-line { font-family:'Inter',sans-serif; font-weight:300;
    font-size:34px; color:var(--soft); letter-spacing:0.01em; }
  .greeting-company { font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:60px; color:var(--white); letter-spacing:-0.005em; margin-top:6px; line-height:1.05; }

  /* thin accent rule under the greeting */
  .rule { width:64px; height:2px; background:var(--accent); border-radius:2px;
    margin:30px auto 46px; opacity:0.9; animation:growRule 1s ease 0.5s both; }
  @keyframes growRule { from{width:0;opacity:0;} to{width:64px;opacity:0.9;} }

  /* NAMES — the hero. clean solid type, generous rhythm. */
  .names { display:block; width:100%; text-align:center; }
  .guest { display:block; width:100%; text-align:center; margin-bottom:26px; opacity:0;
    animation:riseIn 0.95s cubic-bezier(.2,.8,.2,1) both; }
  .guest:last-child { margin-bottom:0; }
  .guest:nth-child(1){ animation-delay:0.30s; }
  .guest:nth-child(2){ animation-delay:0.42s; }
  .guest:nth-child(3){ animation-delay:0.54s; }
  .guest:nth-child(4){ animation-delay:0.66s; }
  .guest:nth-child(5){ animation-delay:0.78s; }
  @keyframes riseIn { from{opacity:0; transform:translateY(24px);} to{opacity:1; transform:none;} }
  @keyframes fadeDown { from{opacity:0; transform:translateY(-14px);} to{opacity:1; transform:none;} }

  .g-name { font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:64px; line-height:1.12; letter-spacing:-0.01em;
    white-space:nowrap; text-align:center; color:var(--white); }
  .g-meta { text-align:center; margin-top:6px; }
  .g-title { font-family:'Inter',sans-serif; font-weight:400; font-size:24px;
    color:var(--soft); letter-spacing:0.02em; line-height:1.3; }
  .g-company { font-family:'Inter',sans-serif; font-weight:300; font-size:30px;
    color:var(--soft); letter-spacing:0.03em; line-height:1.3; margin-top:4px; }

  /* sizes by guest count (grouped = names only, so they can be larger) */
  .names[data-cols="1"] .g-name { font-size:101px; }
  .names[data-cols="2"] .g-name { font-size:83px; }
  .names[data-cols="3"] .g-name { font-size:68px; }
  .names[data-cols="4"] .g-name { font-size:59px; }
  .names[data-cols="5"] .g-name { font-size:50px; }
  .names[data-grouped="true"] .guest { margin-bottom:20px; }

  /* when NOT grouped, greeting shows generic + we still lead with names */
  .greeting.hidden { display:none; }
  .rule.hidden { display:none; }

  /* FOOTER — brand line, quiet */
  .footer { display:block; width:100%; height:82px; overflow:hidden; position:relative; }
  .hauler { position:absolute; left:0; bottom:0; height:100%; display:block; white-space:nowrap; }
  .hauler.run { animation:haul 13s linear; }
  .hauler-inner { display:flex; align-items:flex-end; height:100%;
    animation:bob 0.9s ease-in-out infinite; }
  .robot { height:var(--robot-size); width:auto; flex:0 0 auto; display:block;
    position:relative; bottom:var(--robot-lift); }
  /* rope sits at the robot's hook height above the shared bottom line */
  .rope { height:2px; width:var(--rope-length); background:var(--amber); flex:0 0 auto; opacity:0.95;
    margin-bottom:var(--rope-height); margin-left:-3px; }
  /* text baseline flush with robot baseline */
  .haul-text { font-family:'Space Grotesk',sans-serif; font-size:var(--text-size); font-weight:400;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--soft); flex:0 0 auto;
    line-height:1; margin-left:2px; }
  @keyframes haul { 0%{ transform:translateX(100vw);} 100%{ transform:translateX(-100%);} }
  @keyframes bob { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-1.5px);} }
  .tagline-unused { font-family:'Space Grotesk',sans-serif; font-size:12px; letter-spacing:0.30em;
    text-transform:uppercase; color:var(--faint); text-align:center; }
</style>

<script>
  /* ═══════════════════════════════════════════════════════════
     EDIT YOUR GUESTS HERE — English only. Up to 5 shown.
     If everyone shares a company, it appears once in the greeting
     and only names are listed. Otherwise each name shows its own.
     ═══════════════════════════════════════════════════════════ */
  const visitors = [
    { name:"Manikantan NS",     title:"", company:"Tech Mahindra" },
    { name:"Sandeep Deshpande", title:"", company:"Tech Mahindra" },
    { name:"Hemant Sankhla",    title:"", company:"Tech Mahindra" },
    { name:"Abhishek K",        title:"", company:"Tech Mahindra" },
    { name:"Siddarth SK",       title:"", company:"Tech Mahindra" },
  ];
  /* ═══════════════════════════════════════════════════════════ */

  const shown = visitors.slice(0, 5);
  const names = document.getElementById('names');
  const greeting = document.getElementById('greeting');
  const rule = document.getElementById('rule');
  const greetCompany = document.getElementById('greetCompany');
  names.setAttribute('data-cols', shown.length);

  // time-aware greeting word
  function greetWord(){
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  }

  const companies = shown.map(v => (v.company||'').trim());
  const shared = companies.length && companies.every(c => c && c === companies[0]);

  if (shared) {
    document.getElementById('greetWord').textContent = greetWord() + ',';
    // Template rule: "Team [Company]" for a group (2+); just the company for a solo guest.
    greetCompany.textContent = (shown.length >= 2 ? 'Team ' : '') + companies[0];
    names.setAttribute('data-grouped','true');
    shown.forEach(v => {
      const g = document.createElement('div');
      g.className = 'guest';
      g.innerHTML = '<div class="g-name">'+v.name+'</div>';
      names.appendChild(g);
    });
  } else {
    // mixed companies: greeting says the time-based hello, names carry their own company
    document.getElementById('greetWord').textContent = greetWord();
    greetCompany.textContent = 'Welcome';
    shown.forEach(v => {
      const g = document.createElement('div');
      g.className = 'guest';
      g.innerHTML = '<div class="g-name">'+v.name+'</div>' +
        '<div class="g-meta">' +
          (v.title ? '<div class="g-title">'+v.title+'</div>' : '') +
          (v.company ? '<div class="g-company">'+v.company+'</div>' : '') +
        '</div>';
      names.appendChild(g);
    });
  }

  // Fit names both by WIDTH (no single name overflows) and by HEIGHT
  // (the whole name list always stays above the scrolling ticker, with a gap).
  // If there are many names, they shrink uniformly until they fit; never below a floor.
  var NAME_MIN = 30;     // smallest the names will ever shrink to (px)
  var SAFE_GAP = 24;     // guaranteed clear space above the ticker (px)

  function fitNames(){
    var screen = document.querySelector('.screen');
    var center = document.querySelector('.center');
    var footer = document.querySelector('.footer');
    var nameEls = document.querySelectorAll('.g-name');

    // 1) WIDTH fit — no single name wider than the screen
    var maxW = screen.clientWidth - 128;
    document.querySelectorAll('.g-name, .greeting-company').forEach(function(el){
      el.style.fontSize = '';               // reset to CSS default first
      var size = parseFloat(getComputedStyle(el).fontSize), guard=0;
      while (el.scrollWidth > maxW && size > NAME_MIN && guard < 400){ size-=2; guard++; el.style.fontSize=size+'px'; }
    });

    // 2) HEIGHT fit — shrink names uniformly until the center block clears the ticker
    // available vertical space for .center content = from its top to the footer top, minus gap
    var footerTop = footer.getBoundingClientRect().top;
    var centerTop = center.getBoundingClientRect().top;
    var available = footerTop - centerTop - SAFE_GAP;

    var guard = 0;
    while (center.scrollHeight > available && guard < 200){
      var shrunk = false;
      nameEls.forEach(function(el){
        var size = parseFloat(getComputedStyle(el).fontSize);
        if (size > NAME_MIN){ el.style.fontSize = (size - 2) + 'px'; shrunk = true; }
      });
      // also tighten the row spacing as we go
      var gaps = document.querySelectorAll('.names .guest');
      gaps.forEach(function(g){
        var mb = parseFloat(getComputedStyle(g).marginBottom);
        if (mb > 6) g.style.marginBottom = (mb - 1) + 'px';
      });
      if (!shrunk) break;   // hit the floor; stop
      guard++;
    }
  }
  window.addEventListener('load', fitNames);
  window.addEventListener('resize', fitNames);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitNames);

  // robot hauls one line at a time across the bottom, then the next.
  var lines = [
    "Welcome to where it actually happens.",
    "Material movement, redefined.",
    "Glad you made the trip.",
    "Everything moves. We just make it smarter.",
    "Great things start with a visit.",
    "The future doesn't wait to be carried.",
    "Good things move quietly.",
    "The floor is where strategy meets reality.",
    "You're seeing the future in motion.",
    "Every great factory runs on a thousand invisible decisions.",
    "Autonomy, on your floor."
  ];
  var hauler = document.getElementById('hauler');
  var haulText = document.getElementById('haulText');
  var li = 0;
  function runLine(){
    haulText.textContent = lines[li];
    hauler.classList.remove('run'); void hauler.offsetWidth; hauler.classList.add('run');
    li = (li+1) % lines.length;
  }
  hauler.addEventListener('animationend', function(e){ if(e.animationName==='haul') runLine(); });
  runLine();

  // clock
  function updateClock(){ var now=new Date();
    var hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = hh+':'+mm;
    var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('datestr').textContent = days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear(); }
  updateClock(); setInterval(updateClock,1000);
</script>

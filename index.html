  .bg { position:fixed; top:0; left:0; right:0; bottom:0; z-index:0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 18%, rgba(200,67,75,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 120% 80% at 50% 120%, rgba(32,98,174,0.22) 0%, transparent 55%),
      linear-gradient(180deg, var(--kon) 0%, var(--navy) 60%, var(--kon-2) 100%); }
  .sun { position:fixed; top:-160px; left:50%; transform:translateX(-50%); z-index:0;
    width:520px; height:520px; border-radius:50%;
    background:radial-gradient(circle, rgba(200,67,75,0.16) 0%, rgba(200,67,75,0.05) 45%, transparent 70%);
    animation:sunBreathe 7s ease-in-out infinite; }
  @keyframes sunBreathe { 0%,100%{opacity:0.7; transform:translateX(-50%) scale(0.95);}
    50%{opacity:1; transform:translateX(-50%) scale(1.05);} }

  .screen { position:relative; z-index:5; width:100vw; height:100vh;
    display:grid; grid-template-rows:auto 1fr auto; padding:48px 60px; }

  /* HEADER */
  .header { display:flex; align-items:center; justify-content:space-between; }
  .logo-img { height:54px; width:auto; object-fit:contain; }
  .logo-fallback { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:25px; letter-spacing:0.10em; }
  .logo-fallback span { color:var(--bright); }
  .datetime { text-align:right; font-family:'Space Grotesk',sans-serif; }
  .datetime-time { font-size:28px; font-weight:300; letter-spacing:0.04em; }
  .datetime-date { font-size:13px; color:var(--muted); letter-spacing:0.10em; text-transform:uppercase; margin-top:5px; }

  /* CENTER */
  .center { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:0; }

  .welcome { position:relative; height:120px; margin-bottom:52px;
    display:flex; align-items:center; justify-content:center; width:100%; }
  .welcome .layer { position:absolute; opacity:0; transition:opacity 0.9s ease;
    display:flex; align-items:center; gap:38px; white-space:nowrap; }
  .welcome .layer.show { opacity:1; }
  .welcome .layer::before, .welcome .layer::after { content:''; width:90px; height:1px;
    background:linear-gradient(90deg, transparent, var(--gold)); }
  .welcome .layer::after { background:linear-gradient(90deg, var(--gold), transparent); }
  .welcome .en-txt { font-family:'Space Grotesk',sans-serif; font-size:58px; font-weight:500;
    letter-spacing:0.40em; text-transform:uppercase; color:var(--gold); }
  .welcome .jp-txt { font-family:'Noto Serif Tamil',serif; font-size:66px; font-weight:500;
    letter-spacing:0.08em; color:var(--gold); }

  /* NAMES — vertical stacked list (one guest per row, name on one line) */
  /* NAMES — centered stack directly under WELCOME */
  .names { display:block; width:100%; text-align:center; }

  .guest { position:relative; display:block; width:100%; text-align:center;
    margin-bottom:56px; opacity:0;
    animation:riseIn 1s cubic-bezier(.2,.8,.2,1) both; }
  .guest:last-child { margin-bottom:0; }
  .guest:nth-child(1){ animation-delay:0.16s; }
  .guest:nth-child(2){ animation-delay:0.28s; }
  .guest:nth-child(3){ animation-delay:0.40s; }
  .guest:nth-child(4){ animation-delay:0.52s; }
  .guest:nth-child(5){ animation-delay:0.64s; }
  @keyframes riseIn { from{opacity:0; transform:translateY(28px);} to{opacity:1; transform:none;} }

  .g-name { font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:110px; line-height:1.1; letter-spacing:-0.01em;
    white-space:nowrap; text-align:center;
    background:linear-gradient(180deg, #ffffff 42%, #c9d8ec 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  .g-meta { text-align:center; margin-top:8px; }
  .g-title { font-family:'Inter',sans-serif; font-weight:400;
    font-size:28px; color:rgba(203,183,132,0.92);
    letter-spacing:0.03em; line-height:1.3; }
  .g-company { font-family:'Inter',sans-serif; font-weight:300;
    font-size:34px; color:rgba(255,255,255,0.62);
    letter-spacing:0.04em; line-height:1.3; margin-top:6px; }

  /* fixed name sizes by guest count — no vw units (TV browsers mishandle them) */
  .names[data-cols="1"] .g-name { font-size:130px; }
  .names[data-cols="2"] .g-name { font-size:110px; }
  .names[data-cols="3"] .g-name { font-size:84px; }
  .names[data-cols="4"] .g-name { font-size:64px; }
  .names[data-cols="5"] .g-name { font-size:52px; }

  .divider { width:140px; height:1px; margin-top:46px;
    background:linear-gradient(90deg, transparent, var(--aka) 50%, transparent);
    animation:fadeIn 1.2s ease 0.9s both; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

  /* FOOTER */
  .footer { display:flex; align-items:flex-end; justify-content:center; }
  .tagline { font-family:'Space Grotesk',sans-serif; font-size:13px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--muted); text-align:center; }
  .status { display:flex; align-items:center; gap:10px; }
  .status-text { font-family:'Space Grotesk',sans-serif; font-size:12px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--faint); }
  .status-dot { width:8px; height:8px; border-radius:50%; background:#4ade80;
    box-shadow:0 0 10px #4ade80; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
</style>
</head>
<body>
<div class="bg"></div>
<div class="waves"></div>
<div class="sun"></div>
<div class="screen">
  <header class="header">
    <div class="logo">
      <!-- ▼▼▼  ADD YOUR LOGO HERE — replace the src filename  ▼▼▼ -->
      <img class="logo-img" src="logo.png" alt="ANSCER Robotics"
           onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';">
      <div class="logo-fallback" id="logoFallback" style="display:none;">ANSCER <span>ROBOTICS</span></div>
      <!-- ▲▲▲  ADD YOUR LOGO HERE  ▲▲▲ -->
    </div>
    <div class="datetime">
      <div class="datetime-time" id="clock">--:--</div>
      <div class="datetime-date" id="datestr">-- --- ----</div>
    </div>
  </header>

  <main class="center">
    <div class="welcome">
      <span class="layer en show"><span class="en-txt">Welcome</span></span>
      <span class="layer jp"><span class="jp-txt">வணக்கம்</span></span>
    </div>
    <div class="names" id="names"></div>
    <div class="divider"></div>
  </main>

  <footer class="footer">
    <div class="tagline">Material Movement Redefined</div>
  </footer>
</div>

<script>
  /* ═══════════════════════════════════════════════════════════
     EDIT YOUR GUESTS HERE — English only. Maximum 5 shown.
     ═══════════════════════════════════════════════════════════ */
  const visitors = [
      { name:"Gopinath PS",  title:"", company:"" },
      { name:"Rahul Bala",   title:"", company:"BASE Automation" },
  ];
  /* ═══════════════════════════════════════════════════════════ */

  const shown = visitors.slice(0, 5);
  const names = document.getElementById('names');
  names.setAttribute('data-cols', shown.length);

  shown.forEach(v => {
    const g = document.createElement('div');
    g.className = 'guest';
    g.innerHTML =
      `<div class="g-name">${v.name}</div>` +
      `<div class="g-meta">` +
        (v.title   ? `<div class="g-title">${v.title}</div>` : ``) +
        (v.company ? `<div class="g-company">${v.company}</div>` : ``) +
      `</div>`;
    names.appendChild(g);
  });

  // Shrink any name that would overflow the screen width (measurement-based,
  // works on TV browsers that mishandle vw units). Only shrinks, never grows.
  function fitNames(){
    const maxW = document.querySelector('.screen').clientWidth - 120; // side margins
    document.querySelectorAll('.g-name').forEach(el => {
      let size = parseFloat(getComputedStyle(el).fontSize);
      let guard = 0;
      while (el.scrollWidth > maxW && size > 28 && guard < 400) {
        size -= 2; guard++;
        el.style.fontSize = size + 'px';
      }
    });
  }
  window.addEventListener('load', fitNames);
  window.addEventListener('resize', fitNames);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitNames);

  // welcome cross-fade: English ⇄ Japanese
  const en = document.querySelector('.welcome .en');
  const jp = document.querySelector('.welcome .jp');
  let showingEn = true;
  setInterval(() => {
    showingEn = !showingEn;
    en.classList.toggle('show', showingEn);
    jp.classList.toggle('show', !showingEn);
  }, 3500);

  // clock
  function updateClock(){ const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0'), mm=String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent=`${hh}:${mm}`;
    const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('datestr').textContent=`${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`; }
  updateClock(); setInterval(updateClock,1000);
</script>
</body>
</html>
